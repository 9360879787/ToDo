<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center"
     style="background: linear-gradient(to bottom right,#000000,#111111,#1a1a1a);">

  <div class="p-5 rounded-5 shadow-lg"
       style="
       width: 450px;
       background: rgba(20,20,20,0.95);
       border: 1px solid rgba(255,255,255,0.08);
       backdrop-filter: blur(15px);
       box-shadow: 0 0 40px rgba(255,255,255,0.05);
       ">

    <!-- Logo -->
    <div class="text-center mb-5">

      <div class="mb-3">
        <i class="bi bi-person-plus-fill"
           style="
           font-size:70px;
           color:#ff4d6d;
           text-shadow:0 0 25px rgba(255,77,109,0.7);
           ">
        </i>
      </div>

      <h1 class="fw-bold text-white display-5">
        Create Account
      </h1>

      <p class="text-secondary fs-6">
        Join us and start your journey
      </p>

    </div>

    <!-- Form -->
    <form>

      <!-- Full Name -->
      <div class="mb-4">

        <label class="form-label text-light fw-semibold mb-2">
          Full Name
        </label>

        <div class="input-group">

          <span class="input-group-text border-0 rounded-start-pill px-4"
                style="
                background:#2b2b2b;
                color:#ff4d6d;
                ">

            <i class="bi bi-person-fill fs-5"></i>

          </span>

          <input type="text"
                 class="form-control border-0 rounded-end-pill py-3 text-white"
                 placeholder="Enter your full name"
                 style="background:#2b2b2b;">

        </div>

      </div>

      <!-- Email -->
      <div class="mb-4">

        <label class="form-label text-light fw-semibold mb-2">
          Email
        </label>

        <div class="input-group">

          <span class="input-group-text border-0 rounded-start-pill px-4"
                style="
                background:#2b2b2b;
                color:#ff4d6d;
                ">

            <i class="bi bi-envelope-fill fs-5"></i>

          </span>

          <input type="email"
                 class="form-control border-0 rounded-end-pill py-3 text-white"
                 placeholder="Enter your email"
                 style="background:#2b2b2b;">

        </div>

      </div>

      <!-- Password -->
      <div class="mb-4">

        <label class="form-label text-light fw-semibold mb-2">
          Password
        </label>

        <div class="input-group">

          <span class="input-group-text border-0 rounded-start-pill px-4"
                style="
                background:#2b2b2b;
                color:#ff4d6d;
                ">

            <i class="bi bi-lock-fill fs-5"></i>

          </span>

          <input type="password"
                 class="form-control border-0 rounded-end-pill py-3 text-white"
                 placeholder="Create password"
                 style="background:#2b2b2b;">

        </div>

      </div>

      <!-- Confirm Password -->
      <div class="mb-4">

        <label class="form-label text-light fw-semibold mb-2">
          Confirm Password
        </label>

        <div class="input-group">

          <span class="input-group-text border-0 rounded-start-pill px-4"
                style="
                background:#2b2b2b;
                color:#ff4d6d;
                ">

            <i class="bi bi-shield-lock-fill fs-5"></i>

          </span>

          <input type="password"
                 class="form-control border-0 rounded-end-pill py-3 text-white"
                 placeholder="Confirm password"
                 style="background:#2b2b2b;">

        </div>

      </div>

      <!-- Terms -->
      <div class="form-check mb-4">

        <input class="form-check-input"
               type="checkbox"
               style="background-color:#ff4d6d; border:none;">

        <label class="form-check-label text-secondary">

          I agree to the
          <a href="#"
             class="text-decoration-none"
             style="color:#ff4d6d;">
            Terms & Conditions
          </a>

        </label>

      </div>

      <!-- Register Button -->
      <div class="d-grid mb-4">

        <button class="btn border-0 rounded-pill py-3 fw-bold fs-5 text-white"
                style="
                background: linear-gradient(to right,#ff4d6d,#ff758f);
                box-shadow:0 0 25px rgba(255,77,109,0.5);
                ">

          Create Account

        </button>

      </div>

      <!-- Divider -->
      <div class="text-center text-secondary position-relative mb-4">

        <span class="px-3"
              style="background:#141414; position:relative; z-index:2;">
          OR
        </span>

        <hr style="
            border-color:#333;
            margin-top:-12px;
            ">

      </div>

      <!-- Social Signup -->
      <div class="d-flex gap-3 mb-4">

        <button class="btn btn-dark border border-secondary w-100 rounded-pill py-2">
          <i class="bi bi-google text-danger"></i>
          Google
        </button>

        <button class="btn btn-dark border border-secondary w-100 rounded-pill py-2">
          <i class="bi bi-github text-white"></i>
          GitHub
        </button>

      </div>

    </form>

    <!-- Footer -->
    <div class="text-center">

      <span class="text-secondary">
        Already have an account?
      </span>

      <a href="#"
         class="text-decoration-none fw-semibold"
         style="color:#ff4d6d;">

        Login

      </a>

    </div>

  </div>

</div>
