<div class="container-fluid min-vh-100 p-0"
     style="background: linear-gradient(to bottom right,#000000,#111111,#1a1a1a);">

  <div class="row g-0 min-vh-100">

    <!-- ================= SIDEBAR ================= -->

    <div class="col-lg-3 col-md-4 p-4"
         style="
         background: rgba(20,20,20,0.95);
         border-right:1px solid rgba(255,255,255,0.08);
         backdrop-filter: blur(10px);
         ">

      <!-- Logo -->
      <div class="text-center mb-5">

        <i class="bi bi-check2-square"
           style="
           font-size:60px;
           color:#ff4d6d;
           text-shadow:0 0 20px rgba(255,77,109,0.6);
           ">
        </i>

        <h2 class="text-white fw-bold mt-2">
          TaskMaster
        </h2>

      </div>

      <!-- Profile -->

      <div class="p-3 rounded-4 mb-4"
           style="background:#1d1d1d;">

        <div class="d-flex align-items-center">

          <img [src]="profile_pic"
               class="rounded-circle"
               width="60"
               height="60">

          <div class="ms-3">

            <h5 class="text-white mb-0">
              {{name}}
            </h5>

            <small class="text-secondary">
              {{email}}
            </small>

          </div>

        </div>

      </div>

      <!-- Stats -->

      <div class="mb-4">

        <div class="p-3 rounded-4 mb-3"
             style="background:#1d1d1d;">

          <div class="d-flex justify-content-between">

            <span class="text-secondary">
              Today's Tasks
            </span>

            <span class="text-white fw-bold">
              12
            </span>

          </div>

        </div>

        <div class="p-3 rounded-4 mb-3"
             style="background:#1d1d1d;">

          <div class="d-flex justify-content-between">

            <span class="text-secondary">
              Completed
            </span>

            <span class="text-success fw-bold">
              8
            </span>

          </div>

        </div>

        <div class="p-3 rounded-4"
             style="background:#1d1d1d;">

          <div class="d-flex justify-content-between">

            <span class="text-secondary">
              Deadline Tasks
            </span>

            <span class="text-danger fw-bold">
              3
            </span>

          </div>

        </div>

      </div>

      <!-- Categories -->

 <div class="mb-4">

  <div class="d-flex justify-content-between align-items-center mb-3">

    <h5 class="text-white">
      Categories
    </h5>

    <button class="btn btn-sm rounded-pill text-white"
            style="background:#ff4d6d;">

      +
    </button>

  </div>

  <!-- Add Category Input -->

  <div class="p-3 rounded-4 mb-3"
       style="background:#1d1d1d;">

    <div class="d-flex gap-2 align-items-center">

      <input type="text"
             class="form-control border-0 text-white"
             placeholder="Enter category name"
             style="background:#2a2a2a; height:45px;"
              [(ngModel)]="category_name"
              name="category_name"
             > 

      <button class="btn text-white px-4"
              style="background:#ff4d6d; height:45px; border-radius:12px;" (click)="addcategory()">

        Add
      </button>

    </div>

  </div>

  <!-- Category Item -->

  <div class="p-3 rounded-4 mb-3"
       style="background:#1d1d1d;"
       *ngFor="let cat of category"
       (click)="getTasks(cat)">

    <div class="d-flex justify-content-between align-items-center">

      <div>

        <i class="bi bi-briefcase-fill text-primary"></i>

        <span class="text-white ms-2">
          {{cat.title}}
        </span>

      </div>

      <div>

        <i class="bi bi-pencil-square text-warning me-2"></i>

        <i class="bi bi-trash-fill text-danger"></i>

      </div>

    </div>

  </div>

</div>
      <!-- Logout -->

      <div class="mt-auto">

        <button class="btn w-100 rounded-pill py-3 text-white fw-bold"
                style="
                background: linear-gradient(to right,#ff4d6d,#ff758f);
                box-shadow:0 0 20px rgba(255,77,109,0.4);
                " (click)="logout()">

          <i class="bi bi-box-arrow-right me-2"></i>

          Logout

        </button>

      </div>

    </div>

    <!-- ================= MAIN CONTENT ================= -->

    <div class="col-lg-9 col-md-8 p-5">

      <!-- Top -->

      <div class="d-flex justify-content-between align-items-center mb-5">

        <div>

          <h1 class="text-white fw-bold">
            My Tasks
          </h1>

          <p class="text-secondary">
            Manage your daily productivity
          </p>

        </div>

        <button class="btn rounded-pill px-4 py-2 text-white fw-semibold"
                style="
                background: linear-gradient(to right,#ff4d6d,#ff758f);
                ">

          <i class="bi bi-plus-lg me-2"></i>

          New Task

        </button>

      </div>

    <!-- Create Task -->

<div class="p-4 rounded-5 mb-5"
     style="
     background:#1a1a1a;
     border:1px solid rgba(255,255,255,0.08);
     ">

  <h4 class="text-white mb-4">
    Create New Task
  </h4>

  <div class="row g-3">

    <!-- Task Input -->

    <div class="col-md-6">

      <div class="input-group">

        <span class="input-group-text border-0 rounded-start-pill px-4"
              style="
              background:#2b2b2b;
              color:#ff4d6d;
              ">

          <i class="bi bi-list-task fs-5"></i>

        </span>

        <input type="text"
               class="form-control border-0 rounded-end-pill py-3 text-white"
               placeholder="Enter new task..."
               style="background:#2b2b2b;"
               [(ngModel)]="task"
               name="task">

      </div>

    </div>

    <!-- Date Input -->

    <div class="col-md-3">

      <input type="date"
             class="form-control border-0 rounded-pill py-3 text-secondary"
             style="background:#2b2b2b;"
             [(ngModel)]="task_data"
             name="task_data">

    </div>
    <small> class="text-danger mt-2">
      {{error_message}}
      </small>

    <!-- Category -->

    <div class="col-md-3">

      <select class="form-select border-0 rounded-pill py-3 text-white"
              style="background:#2b2b2b;" 
              [(ngModel)]="selected_category">

        <option *ngFor="let cat of category"  [ngValue]="cat" >
          {{cat.title}}
        </option>

      </select>

    </div>

    <!-- Important Checkbox -->

    <div class="col-md-6 d-flex align-items-center">

      <div class="form-check">

        <input class="form-check-input"
               type="checkbox"
               style="
               background:#ff4d6d;
               border:none;
               ">

        <label class="form-check-label text-secondary ms-2">

          Mark as Important

        </label>

      </div>

    </div>

    <!-- Add Button -->

    <div class="col-md-6">

      <button class="btn w-100 rounded-pill py-3 text-white fw-bold"
              style="
              background: linear-gradient(to right,#ff4d6d,#ff758f);
              box-shadow:0 0 20px rgba(255,77,109,0.3);
              "
              (click)="addTask()">

        <i class="bi bi-plus-circle me-2"></i>

        Add Task

      </button>

    </div>

  </div>

</div>

     <!-- Task List -->

<div class="d-flex flex-column gap-3">

  <!-- Task Item -->

  <div class="p-3 rounded-4 d-flex justify-content-between align-items-center"
       style="
       background:#1a1a1a;
       border:1px solid rgba(255,255,255,0.08);
       "
       *ngFor="let task of tasklist">

    <!-- Left -->

    <div class="d-flex align-items-center gap-4">

      <!-- Checkbox -->

      <div class="form-check">

        <input class="form-check-input"
               type="checkbox"
               style="
               background:#ff4d6d;
               border:none;
               width:20px;
               height:20px;
               ">

      </div>

      <!-- Task Name -->

      <div >

        <h6 class="text-white mb-1 fw-bold">
          {{task.tasks}}
        </h6>

        <small class="text-secondary">

          <i class="bi bi-calendar-event me-1"></i>
          {{task.task_data | date:'shortDate'}}

        </small>

      </div>

      <!-- Category -->

      <span class="badge rounded-pill px-3 py-2"
            style="
            background:#2626ff33;
            color:#6ea8fe;
            ">

        Work

      </span>

      <!-- Important -->

      <span class="badge rounded-pill px-3 py-2"
            style="
            background:#ff4d6d33;
            color:#ff4d6d;
            " >

        Important

      </span>

    </div>

    <!-- Right -->

    <div class="d-flex align-items-center gap-3">

      <!-- Edit -->

      <button class="btn btn-dark rounded-circle"
              style="
              width:42px;
              height:42px;
              ">

        <i class="bi bi-pencil-square text-warning"></i>

      </button>

      <!-- Delete -->

      <button class="btn btn-dark rounded-circle"
              style="
              width:42px;
              height:42px;
              ">

        <i class="bi bi-trash-fill text-danger"></i>

      </button>

    </div>

  </div>

  <!-- Another Task -->

  

</div>

   

    </div>

  </div>

</div>
